# QuantServe Model Onboarding Pipeline
#
# Non-GPU steps run in Cloud Build containers.
# GPU steps (quantize, evaluate, benchmark) run on a dedicated L4 Spot VM
# provisioned by this pipeline and destroyed when complete.
#
# Required substitutions (set automatically by the Cloud Build trigger):
#   _REGION, _ZONE, _BASE_BUCKET, _QUANT_BUCKET, _EVAL_BUCKET,
#   _REG_BUCKET, _PIPELINE_SA, _ARTIFACT_REPO

timeout: '7200s' # 2 hour max for large model quantization

steps:
  # Step 1: Validate model config
  - id: 'validate-config'
    name: 'python3.11-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install pyyaml -q
        python3 - << 'EOF'
        import yaml, sys, glob

        # Find the changed model config
        configs = glob.glob("model-configs/*.yaml")
        if not configs:
            print("ERROR: No model configs found in model-configs/")
            sys.exit(1)

        required_fields = [
            'model_name', 'hf_model_id', 'quantization_scheme',
            'recipe', 'calibration_dataset', 'num_calibration_samples',
            'max_seq_length', 'benchmarks', 'thresholds'
        ]

        for config_path in configs:
            with open(config_path) as f:
                config = yaml.safe_load(f)
            missing = [field for field in required_fields if field not in config]
            if missing:
                print(f"ERROR: {config_path} missing fields: {missing}")
                sys.exit(1)
            print(f"Config valid: {config_path} -> {config['model_name']} / {config['quantization_scheme']}")
            # Write the config path for use in subsequent steps
            with open('/workspace/model_config_path.txt', 'w') as f:
                f.write(config_path)
        EOF
        
  # Step 2: Download base model (if not already in GCS)
  - id: 'download-model'
    name: 'gcr.io/$PROJECT_ID/quantserve-pipeline'
    entrypoint: 'python3'
    args:
      - 'scripts/download_model.py'
      - '--config'
      - '${_MODEL_CONFIG}'
      - '--bucket'
      - '${_BASE_BUCKET}'
    secretEnv: ['HF_TOKEN']

  # Step 3: Quantize
  - id: 'quantize'
    name: 'gcr.io/$PROJECT_ID/quantserve-pipeline'
    entrypoint: 'python3'
    args:
      - 'scripts/quantize_model.py'
      - '--config'
      - '${_MODEL_CONFIG}'
      - '--base-bucket'
      - '${_BASE_BUCKET}'
      - '--quant-bucket'
      - '${_QUANT_BUCKET}'
  
  # Step 4: Evaluate with lm_eval
  - id: 'evaluate'
    name: 'gcr.io/$PROJECT_ID/quantserve-pipeline'
    entrypoint: 'python3'
    args:
      - 'scripts/evaluate_model.py'
      - '--config'
      - '${_MODEL_CONFIG}'
      - '--quant-bucket'
      - '${_QUANT_BUCKET}'
      - '--eval-bucket'
      - '${_EVAL_BUCKET}'

  # Step 5: Benchmark with GuideLLM 
  - id: 'benchmark'
    name: 'gcr.io/$PROJECT_ID/quantserve-pipeline'
    entrypoint: 'python3'
    args:
      - 'scripts/benchmark_model.py'
      - '--config'
      - '${_MODEL_CONFIG}'
      - '--quant-bucket'
      - '${_QUANT_BUCKET}'
      - '--eval-bucket'
      - '${_EVAL_BUCKET}'

  # Step 6: Update model registry
  - id: 'update-registry'
    name: 'gcr.io/$PROJECT_ID/quantserve-pipeline'
    entrypoint: 'python3'
    args:
      - 'scripts/update_registry.py'
      - '--config'
      - '${_MODEL_CONFIG}'
      - '--eval-bucket'
      - '${_EVAL_BUCKET}'
      - '--registry-bucket'
      - '${_REG_BUCKET}'
  
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/hf-access-token/versions/latest
      env: 'HF_TOKEN'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
