# QuantServe Model Onboarding Pipeline
#
# Non-GPU steps run in Cloud Build containers.
# GPU steps (quantize, evaluate, benchmark) run on a dedicated L4 Spot VM
# provisioned by this pipeline and destroyed when complete.
#
# Required substitutions (set automatically by the Cloud Build trigger):
#   _REGION, _ZONE, _BASE_BUCKET, _QUANT_BUCKET, _EVAL_BUCKET,
#   _REG_BUCKET, _PIPELINE_SA, _ARTIFACT_REPO

timeout: '7200s' # 2 hour max for large model quantization

steps:
  # Step 1: Validate model config
  - id: 'validate-config'
    name: 'python:3.11-slim'
    entrypoint: bash
    args:
      - '-c'
      - |
        apt-get update -q && apt-get install -y -q git
        pip install pyyaml -q
        python3 - << 'EOF'
        # Find only the config changed in this commit
        import subprocess, sys, yaml
        result = subprocess.run(
            ["git", "diff", "--name-only", "HEAD~1", "HEAD"],
            capture_output=True, text=True
        )
        changed = [f for f in result.stdout.strip().split("\n") if f.startswith("model-configs/") and f.endswith(".yaml")]

        if not changed:
            print("No model config changed in this commit — nothing to do.")
            sys.exit(0)

        if len(changed) > 1:
            print(f"ERROR: Multiple model configs changed in one commit: {changed}")
            print("Change one model config per commit.")
            sys.exit(1)

        config_path = changed[0]
        with open(config_path) as f:
            config = yaml.safe_load(f)

        required_fields = [
            'model_name', 'hf_model_id', 'quantization_scheme',
            'recipe', 'calibration_dataset', 'num_calibration_samples',
            'max_seq_length', 'benchmarks', 'thresholds'
        ]
        missing = [field for field in required_fields if field not in config]
        if missing:
            print(f"ERROR: {config_path} missing fields: {missing}")
            sys.exit(1)

        print(f"Config valid: {config_path} -> {config['model_name']} / {config['quantization_scheme']}")
        with open('/workspace/model_config_path.txt', 'w') as f:
            f.write(config_path)
        EOF
        
  # Step 2: Download base model (if not already in GCS)
  - id: 'download-model'
    name: '${_ARTIFACT_REPO}:latest'
    entrypoint: bash
    args:
      - '-c'
      - |
        python3 scripts/download_model.py \
          --config "$(cat /workspace/model_config_path.txt)" \
          --bucket "${_BASE_BUCKET}"
    secretEnv: ['HF_TOKEN']

    # Step 3: Upload model config to GCS so the GPU VM can read it
  - id: 'upload-config'
    name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: bash
    args:
      - '-c'
      - |
        CONFIG_PATH=$(cat /workspace/model_config_path.txt)
        GCS_CONFIG_PATH="gs://${_EVAL_BUCKET}/_pipeline_configs/${BUILD_ID}/model_config.yaml"
        gcloud storage cp "${CONFIG_PATH}" "${GCS_CONFIG_PATH}"
        echo "${GCS_CONFIG_PATH}" > /workspace/gcs_config_path.txt

  # Step 4: Provision L4 Spot VM for GPU pipeline
  - id: 'provision-gpu-vm'
    name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: bash
    args:
      - '-c'
      - |
        VM_NAME="quantserve-pipeline-${BUILD_ID:0:8}"
        echo "${VM_NAME}" > /workspace/gpu_vm_name.txt
        gcloud compute instances create "${VM_NAME}" \
          --project="$PROJECT_ID" \
          --zone="${_ZONE}" \
          --machine-type="g2-standard-4" \
          --accelerator="type=nvidia-l4,count=1" \
          --image-family="common-cu124-debian-12-py311" \
          --image-project="ml-images" \
          --boot-disk-size="200GB" \
          --boot-disk-type="pd-ssd" \
          --no-address \
          --subnet="quantserve-pipeline" \
          --service-account="${_PIPELINE_SA}" \
          --scopes="cloud-platform" \
          --maintenance-policy=TERMINATE \
          --metadata=\
        model_config_gcs=$(cat /workspace/gcs_config_path.txt),\
        base_bucket=${_BASE_BUCKET},\
        quant_bucket=${_QUANT_BUCKET},\
        eval_bucket=${_EVAL_BUCKET},\
        reg_bucket=${_REG_BUCKET},\
        build_id=${BUILD_ID},\
        zone=${_ZONE},\
        project_id=$PROJECT_ID,\
        artifact_repo=${_ARTIFACT_REPO} \
          --metadata-from-file=startup-script=pipeline/gpu_startup.sh

  # Step 5: Wait for GPU pipeline to complete (poll GCS flag)
  - id: 'wait-gpu-pipeline'
    name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: bash
    timeout: '6000s'
    args:
      - '-c'
      - |
        COMPLETE_FLAG="gs://${_EVAL_BUCKET}/_pipeline_flags/${BUILD_ID}/COMPLETE"
        FAILURE_FLAG="gs://${_EVAL_BUCKET}/_pipeline_flags/${BUILD_ID}/FAILED"
        echo "Waiting for GPU pipeline (build ${BUILD_ID})..."
        for i in $(seq 1 120); do
          sleep 30
          if gcloud storage ls "${COMPLETE_FLAG}" 2>/dev/null; then
            echo "GPU pipeline complete."
            exit 0
          fi
          if gcloud storage ls "${FAILURE_FLAG}" 2>/dev/null; then
            echo "GPU pipeline FAILED."
            exit 1
          fi
          echo "  Still waiting... (${i}/120)"
        done
        echo "Timeout waiting for GPU pipeline."
        exit 1
  
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/hf-access-token/versions/latest
      env: 'HF_TOKEN'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
